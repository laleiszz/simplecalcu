<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
</head>

<style>

body{
    background-color: white;
}

nav ul{
    list-style: none;
    display: flex;               
    justify-content: space-between; 
    align-items: center;            
    padding: 10px;
    text-align: center;
   
}

.Alert {
    margin-top: 20px;
    margin-left: 20px;
    padding: 5px;
    font-size: 16px;
    background-color: pink;
    border: 2px solid black;
    border-radius: 10px;
}

.Dark {
    margin-top: 20px;
    margin-left: 20px;
    padding: 5px;
    font-size: 16px;
    background-color: pink;
    border: 2px solid black;
    border-radius: 10px;
}

.box {
    width: 700px;
    height: 300px;
    padding: 20px;
    border: 2px solid black;
    border-radius: 10px;
    text-align: center;
    justify-content: center;
    margin: auto;
    margin-top: 100px;
    background-color: pink;
}

.simplecalcu {
    font-size: 50px;
    font-weight: bold;
    margin-bottom: 50px;
    margin-top: 8px;
}

.operations {
    justify-content: center;
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
}

.operations button {
    margin-top: 50px;
    padding: 5px;
    font-size: 12px;
    background-color: lightblue;
    border: 2px solid black;
    border-radius: 10px;
}

.output {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>

<body id="light">
    <nav>
    <ul>
        <li><button class="Alert" onclick="alert('Welcome to My Simple Calculator')">Alert On</button></li>
        <li><button class="Dark" onclick="darkMode(this)">Dark Mode</button></li>
    </ul>
    </nav>

    <div class="box">    
        <h1 class="simplecalcu">Simple Calculator
        </h1>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <div class="operations">
        <button onclick="add()">Add numbers</button>
        <button onclick="sub()">Subtract numbers</button>
        <button onclick="mul()">Multiply numbers</button>
        <button onclick="div()">Divide numbers</button>
        <button onclick="clearResult()">Clear</button>
    </div>

    <div class="output" id="result">Result:0</div>
    </div>


<script>
    let isLightOn = false;
    function darkMode(btn) {

            isLightOn = !isLightOn;
            let light = document.getElementById('light');
             if (isLightOn) {
                light.style.backgroundColor = 'gray';
                light.style.color = 'black';
                console.log("Dark Mode On");
                document.getElementsByClassName('Alert')[0].style.backgroundColor = 'rgb(204, 170, 126)';
                document.getElementsByClassName('Dark')[0].style.backgroundColor = 'rgb(204, 170, 126)';
                document.getElementsByClassName('box')[0].style.backgroundColor = 'rgb(204, 170, 126)';
                btn.innerHTML = 'Light Mode';
            } else {
                light.style.backgroundColor = 'white';
                light.style.color = 'black';
                console.log("Dark Mode Off");
                document.getElementsByClassName('Alert')[0].style.backgroundColor = 'pink';
                document.getElementsByClassName('Dark')[0].style.backgroundColor = 'pink';
                document.getElementsByClassName('box')[0].style.backgroundColor = 'pink';
                btn.innerHTML = 'Dark Mode';
             }

    }

    function add() {
        let num1 = parseFloat(document.getElementById('num1').value);
        let num2 = parseFloat(document.getElementById('num2').value);
        let sum = num1 + num2;
        document.getElementById('result').innerHTML = 'Result: ' + sum;
    }

    function sub() {
        let num1 = parseFloat(document.getElementById('num1').value);
        let num2 = parseFloat(document.getElementById('num2').value);
        let diff = num1 - num2;
        document.getElementById('result').innerHTML = 'Result: ' + diff;
    }

    function mul() {
        let num1 = parseFloat(document.getElementById('num1').value);
        let num2 = parseFloat(document.getElementById('num2').value);
        let product = num1 * num2;
        document.getElementById('result').innerHTML = 'Result: ' + product;
    }

    function div() {
        let num1 = parseFloat(document.getElementById('num1').value);
        let num2 = parseFloat(document.getElementById('num2').value);
        if (num2 === 0) {
            document.getElementById('result').innerHTML = 'Result: Cannot divide by zero';
        } else {
            let quotient = num1 / num2;
            document.getElementById('result').innerHTML = 'Result: ' + quotient;
        }
    }

    function clearResult() {
        document.getElementById('result').innerHTML = 'Result: 0';
    }

</script>

</body>
</html>
